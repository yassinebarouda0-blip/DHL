<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL Tracking System</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Cairo', sans-serif;
  background:linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  min-height:100vh;
  padding:20px;
}

.container{
  max-width:450px;
  margin:auto;
  background:#fff;
  border-radius:20px;
  padding:30px;
  box-shadow:0 25px 50px rgba(0,0,0,0.2);
  text-align:center;
}

.logo{
  font-size:3em;
  background:linear-gradient(45deg, #ff6600, #ffaa00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:15px;
  font-weight:700;
}

.title{
  color:#333;
  font-size:1.4em;
  margin-bottom:30px;
  font-weight:600;
}

input{
  width:100%;
  padding:18px;
  border:3px solid #ffaa00;
  border-radius:15px;
  font-size:16px;
  font-family:'Cairo', sans-serif;
  margin-bottom:20px;
  transition:all 0.3s;
}

input:focus{
  outline:none;
  border-color:#ff6600;
  box-shadow:0 0 20px rgba(255,170,0,0.3);
}

.search-btn{
  width:100%;
  padding:18px;
  background:linear-gradient(45deg, #ff6600, #ffaa00);
  color:white;
  border:none;
  border-radius:15px;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  transition:all 0.3s;
}

.search-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 15px 30px rgba(255,102,0,0.4);
}

/* DHL PANEL */
.dhl-panel{
  position:fixed;
  bottom:30px;
  right:30px;
  width:80px;
  height:80px;
  background:linear-gradient(45deg, #ffaa00, #ff6600);
  border:4px solid #fff;
  border-radius:50%;
  font-size:2.2em;
  cursor:pointer;
  box-shadow:0 15px 35px rgba(255,170,0,0.5);
  transition:all 0.3s ease;
  z-index:1000;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 15px 35px rgba(255,170,0,0.5);}
  50%{box-shadow:0 15px 35px rgba(255,170,0,0.8);}
  100%{box-shadow:0 15px 35px rgba(255,170,0,0.5);}
}

.dhl-panel:hover{
  transform:scale(1.1) rotate(10deg);
}

/* RESULT */
.card{
  margin-top:25px;
  background:#f8f9fa;
  border:3px solid #ffaa00;
  border-radius:20px;
  padding:25px;
  animation:slideUp 0.5s ease;
}

@keyframes slideUp{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

.track-info{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin:20px 0;
}

.status{
  font-weight:700;
  padding:15px;
  border-radius:12px;
  text-align:center;
  font-size:1.1em;
}

/* RECIVUTA MODAL */
.recivuta-modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  z-index:2000;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.recivuta{
  background:#fff;
  width:100%;
  max-width:850px;
  max-height:95vh;
  overflow-y:auto;
  border-radius:20px;
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
  animation:zoomIn 0.4s ease;
}

@keyframes zoomIn{
  from{opacity:0; transform:scale(0.8);}
  to{opacity:1; transform:scale(1);}
}

.recivuta-header{
  background:linear-gradient(135deg, #ff6600, #ffaa00);
  color:white;
  padding:30px;
  text-align:center;
}

.dhl-big-logo{
  font-size:4.5em;
  margin-bottom:10px;
}

.recivuta-title{
  font-size:2.2em;
  font-weight:700;
  margin-bottom:5px;
}

.recivuta-subtitle{
  font-size:1.1em;
  opacity:0.9;
}

.recivuta-body{
  padding:40px;
}

.invoice-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
  margin-bottom:40px;
}

@media (max-width:768px){
  .invoice-grid{grid-template-columns:1fr;}
}

.invoice-section{
  background:#f8f9fa;
  padding:30px;
  border-radius:20px;
  border:3px solid #ffaa00;
}

.section-title{
  color:#ff6600;
  font-size:1.5em;
  font-weight:700;
  margin-bottom:25px;
  text-align:center;
  padding-bottom:15px;
  border-bottom:4px solid #ffaa00;
}

.detail-row{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
  padding:12px 0;
  font-size:1.1em;
  border-bottom:1px dashed #dee2e6;
}

.detail-row:last-child{
  border-bottom:none;
  font-weight:700;
  color:#ff6600;
  font-size:1.3em;
  background:linear-gradient(90deg, #ff6600, #ffaa00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.barcode-section{
  text-align:center;
  margin:40px 0;
  padding:25px;
  background:#f8f9fa;
  border-radius:15px;
  border:3px dashed #ffaa00;
}

.barcode-title{
  color:#ff6600;
  font-weight:700;
  margin-bottom:15px;
  font-size:1.3em;
}

.barcode-code{
  font-family:'Courier New', monospace;
  font-size:2em;
  font-weight:700;
  letter-spacing:5px;
  background:linear-gradient(90deg, #333, #666, #333);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.footer-note{
  background:linear-gradient(135deg, #ff6600, #ffaa00);
  color:white;
  padding:25px;
  border-radius:20px;
  text-align:center;
  font-weight:600;
  margin-top:30px;
}

.print-actions{
  padding:30px;
  text-align:center;
  background:#f8f9fa;
  border-top:4px solid #ffaa00;
  border-radius:0 0 20px 20px;
}

.btn{
  padding:15px 35px;
  border:none;
  border-radius:12px;
  font-size:17px;
  font-weight:700;
  cursor:pointer;
  margin:0 10px;
  transition:all 0.3s;
}

.btn-close{
  background:linear-gradient(45deg, #6c757d, #adb5bd);
  color:white;
}

.btn-print{
  background:linear-gradient(45deg, #28a745, #20c997);
  color:white;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="container">
  <div class="logo">📦 DHL</div>
  <div class="title">نظام تتبع الشحنات</div>
  
  <input id="code" placeholder="أدخل رقم التتبع JDxxxxxxxx">
  <button class="search-btn" onclick="search()">🔍 بحث</button>
  
  <div id="result"></div>
</div>

<!-- DHL PANEL أصفر -->
<button class="dhl-panel" id="dhlPanel">DHL</button>

<!-- RECIVUTA MODAL -->
<div class="recivuta-modal" id="recivutaModal">
  <div class="recivuta" id="recivutaContent">
    <!-- سيتم توليد RECIVUTA هنا -->
  </div>
</div>

<script>
let shipments = JSON.parse(localStorage.getItem("shipments")) || [];
let clicks = 0;
let currentShipment = null;

// DHL PANEL - 10 نقرات
document.getElementById("dhlPanel").onclick = function(){
  clicks++;
  
  if(clicks === 10){
    clicks = 0;
    showRecivutaPanel();
  }
  
  // تأثير بصري
  this.style.transform = 'scale(1.2) rotate(360deg)';
  setTimeout(() => {
    this.style.transform = 'scale(1) rotate(0deg)';
  }, 200);
};

function showRecivutaPanel(){
  let name = prompt("الاسم الكامل:");
  let address = prompt("العنوان:");
  let email = prompt("الإيميل:");
  let phone = prompt("الهاتف:");
  
  if(!name) return;
  
  let code = "JD" + Math.floor(100000000000000000 + Math.random() * 900000000000000000);
  
  currentShipment = {
    code: code,
    fullname: name,
    address: address,
    gmail: email,
    phone: phone,
    createdAt: Date.now()
  };
  
  // حفظ في localStorage
  shipments.push(currentShipment);
  localStorage.setItem("shipments", JSON.stringify(shipments));
  
  showRecivuta();
  document.getElementById("code").value = code;
}

function search(){
  let code = document.getElementById("code").value.trim();
  let s = shipments.find(x => x.code === code);
  
  if(!s){
    document.getElementById("result").innerHTML = '<div style="color:#ff6600; font-weight:700; padding:20px;">❌ الشحنة غير موجودة</div>';
    return;
  }
  
  currentShipment = s;
  showTracking(s);
}

function showTracking(s){
  let hours = (Date.now() - s.createdAt) / 3600000;
  let day = Math.floor(hours / 24);
  if(day > 6) day = 6;
  
  let status = day >= 6 ? "✅ تم التسليم" : 
               day === 5 ? "⚠️ متوقفة" : 
               `📦 اليوم ${day}/6`;
  
  document.getElementById("result").innerHTML = `
    <div class="card">
      <h3 style="color:#ff6600; margin-bottom:15px;">${s.code}</h3>
      <div class="track-info">
        <div><strong>${s.fullname}</strong></div>
        <div style="color:#ff6600; font-weight:700;">${status}</div>
      </div>
      <div style="margin-top:20px; padding:15px; background:#fff3cd; border-radius:12px; border-left:5px solid #ffaa00;">
        اضغط على <strong>DHL الأصفر</strong> 10 مرات لإصدار RECIVUTA
      </div>
    </div>
  `;
}

function showRecivuta(){
  const modal = document.getElementById("recivutaModal");
  const content = document.getElementById("recivutaContent");
  const now = new Date();
  
  content.innerHTML = `
    <div class="recivuta-header">
      <div class="dhl-big-logo">📦 DHL EXPRESS</div>
      <div class="recivuta-title">RECIVUTA UFFICIALE</div>
      <div class="recivuta-subtitle">الفاتورة الرسمية للشحن</div>
    </div>
    
    <div class="recivuta-body">
      <div class="invoice-grid">
        <div class="invoice-section">
          <div class="section-title">👤 بيانات العميل</div>
          <div class="detail-row">
            <span>الاسم:</span>
            <span>${currentShipment.fullname}</span>
          </div>
          <div class="detail-row">
            <span>العنوان:</span>
            <span>${currentShipment.address}</span>
          </div>
          <div class="detail-row">
            <span>البريد الإلكتروني:</span>
            <span>${currentShipment.gmail}</span>
          </div>
          <div class="detail-row">
            <span>الهاتف:</span>
            <span>${currentShipment.phone}</span>
          </div>
        </div>
        
        <div class="invoice-section">
          <div class="section-title">📦 الشحنة</div>
          <div class="detail-row">
            <span>رقم التتبع:</span>
            <span>${currentShipment.code}</span>
          </div>
          <div class="detail-row">
            <span>تاريخ الإصدار:</span>
            <span>${now.toLocaleDateString('ar-SA')}</span>
          </div>
          <div class="detail-row">
            <span>الحالة:</span>
            <span>✅ مُسلمة في إيطاليا</span>
          </div>
          <div class="detail-row">
            <span>القيمة:</span>
            <span>€ 250.00</span>
          </div>
        </div>
      </div>
      
      <div class="barcode-section">
        <div class="barcode-title">باركود التتبع</div>
        <div class="barcode-code">${currentShipment.code}</div>
      </div>
      
      <div class="footer-note">
        <strong>DHL EXPRESS Italia</strong><br>
        هذه RECIVUTA رسمية صالحة للجمارك والإجراءات الرسمية<br>
        شكراً لاختيارك DHL لشحنتك الآمنة ✅
      </div>
    </div>
    
    <div class="print-actions">
      <button class="btn btn-close" onclick="closeRecivuta()">إغلاق</button>
      <button class="btn btn-print" onclick="window.print()">🖨️ طباعة RECIVUTA</button>
    </div>
  `;
  
  modal.style.display = "flex";
}

function closeRecivuta(){
  document.getElementById("recivutaModal").style.display = "none";
}
</script>

</body>
</html>
