<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL Tracking System</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:linear-gradient(135deg,#ff6b6b,#feca57,#ff9ff3);
  min-height:100vh;
  padding:20px;
}

.container{
  max-width:650px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:15px;
  text-align:center;
}

#searchInput{
  width:100%;
  padding:12px;
  border:2px solid #ffcc00;
  border-radius:10px;
}

.search-btn{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#ffcc00;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

.result{
  display:none;
  margin-top:20px;
}

.card{
  max-width:520px;
  margin:auto;
  background:#fff;
  border:1px solid #ddd;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  text-align:left;
}

.header{
  background:#ffcc00;
  padding:15px;
  text-align:center;
}

.track{
  position:relative;
  height:14px;
  background:#eee;
  border-radius:20px;
  overflow:hidden;
  margin:20px 0;
}

.progress{
  height:100%;
  background:#28a745;
}

.truck{
  position:absolute;
  top:-28px;
  font-size:26px;
  animation:shake 0.4s infinite;
}

@keyframes shake{
  0%{transform:translateY(0px);}
  50%{transform:translateY(1px);}
  100%{transform:translateY(0px);}
}

/* ADMIN BUTTON */
.dhl-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#ffcc00;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

/* ADMIN */
.admin{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.admin-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
}
</style>
</head>

<body>

<div class="container">

<h2>DHL Tracking System</h2>

<input id="searchInput" placeholder="DHL-XXXXXX">
<button class="search-btn" onclick="searchTracking()">Search</button>

<div id="result" class="result"></div>

</div>

<button class="dhl-btn" onclick="adminClick()">ADMIN</button>

<div class="admin" id="admin">
<div class="admin-box">

<h3>Admin Panel</h3>

<input id="fullname" placeholder="Name">
<input id="address" placeholder="Address">
<input id="gmail" placeholder="Gmail">
<input id="phone" placeholder="Phone">

<button onclick="addShipment()">Add Shipment</button>

</div>
</div>

<script>

let shipments = JSON.parse(localStorage.getItem("dhlShipments")) || [];

let clicks = 0;
const PASSWORD = "200911";

/* ADMIN 10 CLICKS */
function adminClick(){
  clicks++;
  if(clicks < 10) return;

  clicks = 0;

  const pass = prompt("Password:");

  if(pass === PASSWORD){
    document.getElementById("admin").style.display="flex";
  }
}

/* ADD */
function addShipment(){

  const code = "DHL-" + Math.floor(Math.random()*900000+100000);

  const s = {
    code,
    fullname: document.getElementById("fullname").value,
    address: document.getElementById("address").value,
    gmail: document.getElementById("gmail").value,
    phone: document.getElementById("phone").value,
    createdAt: Date.now()
  };

  shipments.unshift(s);
  localStorage.setItem("dhlShipments", JSON.stringify(shipments));

  alert("Added: " + code);

  show(s);
}

/* SEARCH */
function searchTracking(){

  const code = document.getElementById("searchInput").value.toUpperCase();
  const s = shipments.find(x => x.code === code);

  if(!s){
    document.getElementById("result").style.display="block";
    document.getElementById("result").innerHTML="Not Found";
    return;
  }

  show(s);
}

/* TRACKING 6 DAYS + STEP EVERY 5 HOURS */
function show(s){

  let hours = Math.floor((Date.now() - s.createdAt)/(1000*60*60));

  if(hours > 144) hours = 144;

  let step = Math.floor(hours / 5);

  let progress = (hours / 144) * 100;

  let status = "In Transit";
  if(hours >= 144) status = "Delivered";

  document.getElementById("result").style.display="block";

  document.getElementById("result").innerHTML = `

  <div class="card">

    <div class="header">
      <h2>DHL</h2>
    </div>

    <div style="padding:20px;">

      <p><b>Tracking:</b> ${s.code}</p>
      <p><b>Status:</b> ${status}</p>

      <p><b>Time:</b> ${hours}h / 144h</p>
      <p><b>Steps:</b> ${step} / 28</p>

      <div class="track">

        <div class="progress" style="width:${progress}%"></div>

        <div class="truck" style="right:${progress}%;">
          🚚 DHL
        </div>

      </div>

    </div>

  </div>

  `;
}

</script>

</body>
</html>
