<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracking System</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#ffcc00,#ffffff);
  min-height:100vh;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:2px solid #ffcc00;
  border-radius:8px;
}

/* BUTTON */
.search-btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#ffcc00;
  color:#000;
  font-weight:bold;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* RESULT */
#result{
  margin-top:20px;
  text-align:left;
}

/* CARD */
.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* TRACK */
.track{
  position:relative;
  height:12px;
  background:#ddd;
  border-radius:20px;
  margin:30px 0;
  overflow:visible;
}

/* PROGRESS */
.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00c853,#00e676);
}

/* 🚚 TRUCK */
.truck{
  position:absolute;
  top:-35px;
  left:0%;
  font-size:26px;
  transform:translateX(-50%) scaleX(-1);
}

/* ADMIN BUTTON */
.admin-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#ffcc00;
  font-weight:bold;
  border:none;
  cursor:pointer;
}

/* ADMIN PANEL */
.admin{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.admin-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}
</style>
</head>

<body>

<div class="container">

<h2>📦 Tracking System</h2>

<button onclick="generate()">➕ Generate Shipment</button>

<input id="code" placeholder="Enter Tracking Code">
<button class="search-btn" onclick="search()">SEARCH</button>

<div id="result"></div>

</div>

<!-- 🔘 ADMIN -->
<button class="admin-btn" onclick="openAdmin()">DHL</button>

<div class="admin" id="admin">
<div class="admin-box">

<h3>Admin Panel</h3>

<input id="fullname" placeholder="Name">
<input id="address" placeholder="Address">
<input id="gmail" placeholder="Email">
<input id="phone" placeholder="Phone">

<button onclick="generate()">Add Shipment</button>

</div>
</div>

<script>

/* 📦 STORAGE */
let shipments = JSON.parse(localStorage.getItem("shipments")) || [];

/* 🔐 ADMIN 10 CLICKS */
let clicks = 0;
let locked = false;

function openAdmin(){

  if(locked) return;

  clicks++;

  if(clicks < 10) return;

  clicks = 0;
  locked = true;

  setTimeout(()=> locked = false, 3000);

  let pass = prompt("Password:");

  if(pass === "200911"){
    document.getElementById("admin").style.display = "flex";
  }else{
    alert("Wrong password");
  }
}

/* ➕ GENERATE JD CODE */
function generate(){

  let code = "J)JD" + Math.floor(100000000000000000 + Math.random()*900000000000000000);

  let s = {
    code: code,
    fullname: fullname.value || "Unknown",
    address: address.value || "Unknown",
    gmail: gmail.value || "Unknown",
    phone: phone.value || "Unknown",
    createdAt: Date.now()
  };

  shipments.push(s);
  localStorage.setItem("shipments", JSON.stringify(shipments));

  alert("Generated: " + code);
}

/* 🔍 SEARCH */
function search(){

  let code = document.getElementById("code").value.trim();

  let s = shipments.find(x => x.code === code);

  if(!s){
    result.innerHTML = "❌ Not Found";
    return;
  }

  show(s);
}

/* 📄 SHOW */
function show(s){

  result.innerHTML = `
  <div class="card">

    <h3>RECIVUTA</h3>

    <p><b>Tracking:</b> ${s.code}</p>

    <div class="track">
      <div class="progress" id="bar"></div>
      <div class="truck" id="truck">🚚</div>
    </div>

    <p><b>Name:</b> ${s.fullname}</p>
    <p><b>Address:</b> ${s.address}</p>
    <p><b>Email:</b> ${s.gmail}</p>
    <p><b>Phone:</b> ${s.phone}</p>

  </div>
  `;

  setTimeout(()=>moveTruck(s.createdAt),100);
}

/* 🚚 MOVE (6 DAYS SYSTEM) */
function moveTruck(start){

  const truck = document.getElementById("truck");
  const bar = document.getElementById("bar");

  function update(){

    let hours = (Date.now() - start) / 3600000;

    let progress = Math.min((hours / 144) * 100, 100);

    let position = progress;

    truck.style.left = position + "%";
    bar.style.width = progress + "%";

    if(progress < 100){
      requestAnimationFrame(update);
    } else {
      result.innerHTML = `
      <div class="card">
        <h2 style="color:red;">⚠️ Ordine sospeso</h2>
        <p>Delivered 🇮🇹</p>
      </div>
      `;
    }
  }

  update();
}

</script>

</body>
</html>
