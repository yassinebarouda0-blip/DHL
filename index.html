<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL Tracking System</title>

<style>

/* ===================== GLOBAL RESET ===================== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  min-height:100vh;
  padding:20px;
}

/* ===================== MAIN CONTAINER ===================== */
.container{
  max-width:520px;
  margin:auto;
  background:#fff;
  border-radius:25px;
  padding:35px;
  text-align:center;
  box-shadow:0 30px 60px rgba(0,0,0,0.3);
}

/* ===================== LOGO ===================== */
.logo{
  font-size:3em;
  margin:20px 0;
  font-weight:bold;
}

/* ===================== INPUT ===================== */
input{
  width:100%;
  padding:18px;
  border:3px solid #ffaa00;
  border-radius:15px;
  text-align:center;
  margin-bottom:15px;
}

/* ===================== BUTTON ===================== */
button{
  width:100%;
  padding:18px;
  background:linear-gradient(45deg,#ff6600,#ffaa00);
  border:none;
  color:white;
  font-weight:bold;
  border-radius:15px;
  cursor:pointer;
}

/* ===================== TRACK ===================== */
.track-container{
  margin-top:30px;
  background:#f8f9fa;
  padding:20px;
  border-radius:20px;
}

.route-labels{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  margin-bottom:15px;
}

.route-track{
  height:22px;
  background:#ddd;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ff6600,#4ecdc4);
  transition:1s;
}

.truck{
  position:absolute;
  top:-45px;
  left:0%;
  transition:1s;
  font-size:30px;
}

/* ===================== ADMIN BUTTON ===================== */
.admin-btn{
  position:fixed;
  bottom:30px;
  right:30px;
  width:80px;
  height:80px;
  border-radius:50%;
  background:gold;
  font-weight:bold;
  border:4px solid #fff;
}

/* ===================== MODAL ===================== */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

/* ===================== RECIVUTA ===================== */
.recivuta{
  background:#fff;
  width:90%;
  max-width:850px;
  padding:30px;
  border-radius:20px;
}

.header{
  background:linear-gradient(45deg,#ff6600,#ffaa00);
  color:white;
  padding:25px;
  border-radius:15px;
  text-align:center;
  font-size:22px;
}

/* ===================== DETAILS ===================== */
.box{
  margin-top:20px;
  padding:15px;
  background:#f8f9fa;
  border-radius:15px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px dashed #ccc;
}

/* ===================== BARCODE ===================== */
.barcode{
  margin-top:25px;
  font-size:28px;
  font-weight:bold;
  letter-spacing:5px;
}

/* ===================== FOOTER ===================== */
.footer{
  margin-top:20px;
  background:linear-gradient(45deg,#ff6600,#ffaa00);
  padding:20px;
  color:white;
  border-radius:15px;
  text-align:center;
}

/* ===================== ADMIN PANEL ===================== */
.admin-panel{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.panel-box{
  background:#fff;
  padding:25px;
  border-radius:20px;
  width:95%;
  max-width:500px;
}

.panel-box input{
  margin:5px 0;
  padding:12px;
  width:100%;
  border:2px solid #ffaa00;
  border-radius:10px;
}

</style>

</head>

<body>

<!-- ===================== MAIN UI ===================== -->
<div class="container">

  <div class="logo">📦 DHL SYSTEM</div>

  <h2>Tracking System</h2>

  <input id="code" placeholder="Enter Tracking Code">
  <button onclick="search()">Search</button>

  <div id="result"></div>

</div>

<!-- ===================== ADMIN BUTTON ===================== -->
<button class="admin-btn" id="adminBtn">DHL</button>

<!-- ===================== ADMIN PANEL ===================== -->
<div class="admin-panel" id="adminPanel">
  <div class="panel-box">

    <h3>Admin Control</h3>

    <input id="nome" placeholder="Nome">
    <input id="cognome" placeholder="Cognome">
    <input id="indirizzo" placeholder="Indirizzo">
    <input id="email" placeholder="Gmail">
    <input id="numero" placeholder="Numero">
    <input id="dob" placeholder="Data di nascita">

    <button onclick="createShipment()">Create Tracking</button>
    <button onclick="closePanel()">Close</button>

  </div>
</div>

<script>

let shipments = JSON.parse(localStorage.getItem("shipments")) || [];
let clicks = 0;

/* ===================== ADMIN ACCESS ===================== */
document.getElementById("adminBtn").onclick = function(){
  clicks++;

  if(clicks === 10){
    clicks = 0;

    let pass = prompt("Enter Admin Password:");

    if(pass === "200911"){
      document.getElementById("adminPanel").style.display = "flex";
    } else {
      alert("Wrong Password");
    }
  }
};

/* ===================== CREATE SHIPMENT ===================== */
function createShipment(){

  let shipment = {
    code: "JD" + Date.now(),
    nome: document.getElementById("nome").value,
    cognome: document.getElementById("cognome").value,
    indirizzo: document.getElementById("indirizzo").value,
    email: document.getElementById("email").value,
    numero: document.getElementById("numero").value,
    dob: document.getElementById("dob").value
  };

  shipments.push(shipment);
  localStorage.setItem("shipments", JSON.stringify(shipments));

  document.getElementById("code").value = shipment.code;

  alert("Tracking Created: " + shipment.code);

  closePanel();
}

/* ===================== SEARCH ===================== */
function search(){

  let code = document.getElementById("code").value;

  let s = shipments.find(x => x.code === code);

  if(!s){
    document.getElementById("result").innerHTML = "❌ Not Found";
    return;
  }

  document.getElementById("result").innerHTML = `
    <div class="track-container">
      <h3>Found Shipment</h3>
      <p>${s.nome} ${s.cognome}</p>
      <p>${s.indirizzo}</p>
      <p>${s.code}</p>
    </div>
  `;
}

/* ===================== CLOSE PANEL ===================== */
function closePanel(){
  document.getElementById("adminPanel").style.display = "none";
}

</script>

</body>
</html>
