<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL Tracking System</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  min-height:100vh;
  padding:20px;
}

.container{
  max-width:520px;
  margin:auto;
  background:#fff;
  border-radius:25px;
  padding:35px;
  text-align:center;
  box-shadow:0 30px 60px rgba(0,0,0,0.3);
}

.logo{
  font-size:3em;
  margin:20px 0;
  font-weight:bold;
}

input{
  width:100%;
  padding:15px;
  border:2px solid #ffaa00;
  border-radius:10px;
  margin:10px 0;
  text-align:center;
}

button{
  width:100%;
  padding:15px;
  background:linear-gradient(45deg,#ff6600,#ffaa00);
  border:none;
  color:white;
  font-weight:bold;
  border-radius:10px;
  cursor:pointer;
}

.admin-btn{
  position:fixed;
  bottom:25px;
  right:25px;
  width:80px;
  height:80px;
  border-radius:50%;
  background:gold;
  font-weight:bold;
  border:4px solid #fff;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.recivuta{
  background:#fff;
  width:90%;
  max-width:500px;
  padding:20px;
  border-radius:15px;
}

.header{
  background:linear-gradient(45deg,#ff6600,#ffaa00);
  color:#fff;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px dashed #ccc;
}

.barcode{
  text-align:center;
  font-size:22px;
  margin-top:15px;
  letter-spacing:4px;
}

.footer{
  margin-top:15px;
  padding:10px;
  background:linear-gradient(45deg,#ff6600,#ffaa00);
  color:#fff;
  text-align:center;
  border-radius:10px;
}

/* ADMIN PANEL */
#adminPanel{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.panel{
  background:#fff;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">📦 DHL</div>

  <h3>Tracking System</h3>

  <input id="code" placeholder="Enter Tracking Code">
  <button onclick="search()">Search</button>

  <div id="result"></div>

</div>

<!-- ADMIN BUTTON -->
<button class="admin-btn" id="adminBtn">DHL</button>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="recivuta" id="recivuta"></div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div class="panel">

    <h2>Admin Panel</h2>

    <input id="name" placeholder="Name">
    <input id="from" placeholder="From">
    <input id="to" placeholder="To">

    <button onclick="addShipment()">Add Shipment</button>
    <button onclick="closeAdmin()">Close</button>

  </div>
</div>

<script>

let shipments = JSON.parse(localStorage.getItem("shipments")) || [];
let clicks = 0;
let current = null;

/* ================= ADMIN BUTTON ================= */
document.getElementById("adminBtn").onclick = function(){
  clicks++;

  if(clicks === 10){
    clicks = 0;

    let pass = prompt("Enter Password:");

    if(pass === "200911"){
      document.getElementById("adminPanel").style.display = "flex";
    } else {
      alert("Wrong Password");
    }
  }
};

/* ================= ADD SHIPMENT ================= */
function addShipment(){

  let name = document.getElementById("name").value;
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;

  if(!name || !from || !to){
    alert("Fill all fields");
    return;
  }

  let shipment = {
    code: "JD" + Date.now(),
    name,
    from,
    to
  };

  shipments.push(shipment);
  localStorage.setItem("shipments", JSON.stringify(shipments));

  document.getElementById("code").value = shipment.code;

  current = shipment;
  showRecivuta();
}

/* ================= SEARCH ================= */
function search(){

  let code = document.getElementById("code").value;

  let found = shipments.find(s => s.code === code);

  if(!found){
    document.getElementById("result").innerHTML = "❌ Not Found";
    return;
  }

  current = found;
  showRecivuta();
}

/* ================= RECEIPT ================= */
function showRecivuta(){

  document.getElementById("modal").style.display = "flex";

  document.getElementById("recivuta").innerHTML = `
    <div class="header">📦 DHL RECEIPT</div>

    <div class="row"><span>Name</span><span>${current.name}</span></div>
    <div class="row"><span>Code</span><span>${current.code}</span></div>
    <div class="row"><span>From</span><span>${current.from}</span></div>
    <div class="row"><span>To</span><span>${current.to}</span></div>

    <div class="barcode">${current.code}</div>

    <div class="footer">DHL SIMULATION</div>

    <br>
    <button onclick="closeModal()">Close</button>
  `;
}

/* ================= CLOSE MODAL ================= */
function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* ================= CLOSE ADMIN ================= */
function closeAdmin(){
  document.getElementById("adminPanel").style.display = "none";
}

</script>

</body>
</html>
