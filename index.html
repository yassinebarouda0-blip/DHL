<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL Tracking System</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:linear-gradient(135deg,#ff6b6b,#feca57,#ff9ff3);
  min-height:100vh;
  padding:20px;
}

.container{
  max-width:650px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:15px;
  text-align:center;
}

/* SEARCH */
.search-box{position:relative;margin-top:20px;}

#searchInput{
  width:100%;
  padding:15px 50px 15px 15px;
  font-size:16px;
  border:2px solid #ffcc00;
  border-radius:10px;
}

.search-btn{
  position:absolute;
  right:5px;
  top:5px;
  height:85%;
  width:45px;
  border:none;
  background:#ffcc00;
}

/* RESULT */
.result{
  display:none;
  margin-top:20px;
  text-align:left;
}

/* CARD */
.dhl-card{
  max-width:500px;
  margin:auto;
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.dhl-header{
  background:#ffcc00;
  padding:18px;
  text-align:center;
}

/* TRACK */
.track-line{
  position:relative;
  height:10px;
  background:linear-gradient(to right,#eee,#d4f1ff,#eee);
  border-radius:20px;
  overflow:visible;
  margin:10px 0;
}

/* GREEN BAR */
.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00c853,#00e676);
}

/* 🚚 TRUCK */
.truck{
  position:absolute;
  top:-15px;
  right:0%;
  font-size:22px;
  transition:none;
  will-change:right;
}

/* BUTTON */
.dhl-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#ffcc00;
  border:none;
}

/* ADMIN */
.admin{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.admin-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
}
</style>
</head>

<body>

<div class="container">

<h2>DHL Tracking System</h2>

<div class="search-box">
<input id="searchInput" placeholder="DHL-XXXXXX">
<button class="search-btn" onclick="searchTracking()">Search</button>
</div>

<div id="result" class="result"></div>

</div>

<button class="dhl-btn" onclick="dhlClick()">DHL</button>

<!-- ADMIN -->
<div class="admin" id="admin">
<div class="admin-box">

<h3>Admin Panel</h3>

<input id="fullname" placeholder="Nome e Cognome">
<input id="address" placeholder="Indirizzo">
<input id="gmail" placeholder="Gmail">
<input id="phone" placeholder="Numero telefono">

<button onclick="addShipment()">Add Shipment</button>

</div>
</div>

<script>

let shipments = JSON.parse(localStorage.getItem("dhlShipments")) || [];
let clicks = 0;
const PASSWORD = "200911";

/* ADMIN OPEN */
function dhlClick(){
  clicks++;
  if(clicks < 10) return;

  clicks = 0;

  const p = prompt("Password:");
  if((p||"").trim() === PASSWORD){
    document.getElementById("admin").style.display = "flex";
  }else{
    alert("Wrong password");
  }
}

/* ADD SHIPMENT */
function addShipment(){

  const code = "DHL-" + Math.floor(Math.random()*900000+100000);

  const s = {
    code,
    fullname: document.getElementById("fullname").value,
    address: document.getElementById("address").value,
    gmail: document.getElementById("gmail").value,
    phone: document.getElementById("phone").value,
    date: new Date().toLocaleDateString(),
    createdAt: Date.now()
  };

  shipments.unshift(s);
  localStorage.setItem("dhlShipments", JSON.stringify(shipments));

  alert("Added: " + code);

  showTrackingAndReceipt(s);
}

/* SEARCH */
function searchTracking(){

  const code = document.getElementById("searchInput").value.toUpperCase();
  const s = shipments.find(x => x.code === code);

  if(!s){
    document.getElementById("result").style.display="block";
    document.getElementById("result").innerHTML="Not Found";
    return;
  }

  showTrackingAndReceipt(s);
}

/* 🚚 SMOOTH MOVE (FIXED) */
function moveTruckSmooth(target){

  const truck = document.getElementById("truck");
  const bar = document.querySelector(".progress");

  if(!truck || !bar) return;

  let current = parseFloat(truck.dataset.pos || 0);

  function animate(){

    let diff = target - current;

    if(Math.abs(diff) < 0.01){
      current = target;

      truck.style.right = "100%";
      bar.style.width = "100%";

      return;
    }

    // ⏳ حركة بطيئة (6 أيام simulation)
    current += diff * 0.015;

    truck.style.right = current + "%";
    truck.dataset.pos = current;

    bar.style.width = current + "%";

    requestAnimationFrame(animate);
  }

  animate();
}

/* MAIN */
function showTrackingAndReceipt(s){

  let hoursPassed = Math.floor((Date.now() - s.createdAt) / 3600000);
  if(hoursPassed > 144) hoursPassed = 144;

  let daysPassed = Math.floor(hoursPassed / 24);
  if(daysPassed > 6) daysPassed = 6;

  let progress = (hoursPassed / 144) * 100;

  document.getElementById("result").style.display = "block";

  document.getElementById("result").innerHTML = `
  <div class="dhl-card">

    <div class="dhl-header">
      <h2>DHL EXPRESS</h2>
    </div>

    <div style="padding:20px;">

      <p><b>Tracking:</b> ${s.code}</p>
      <p><b>Status:</b> In transit</p>

      <p><b>Route:</b> Sharm El Sheikh 🇪🇬 ➜ Italia 🇮🇹</p>
      <p><b>Data:</b> ${s.date}</p>

      <p><b>Giorni:</b> ${daysPassed}/6</p>

      <div class="track-line">
        <div class="progress" style="width:${progress}%"></div>
        <div class="truck" id="truck">🚚</div>
      </div>

      <hr>

      <h3>Recivuta</h3>

      <p><b>Nome:</b> ${s.fullname}</p>
      <p><b>Indirizzo:</b> ${s.address}</p>
      <p><b>Email:</b> ${s.gmail}</p>
      <p><b>Telefono:</b> ${s.phone}</p>

    </div>

  </div>
  `;

  setTimeout(()=>{
    moveTruckSmooth(progress);
  },100);
}

</script>

</body>
</html>
