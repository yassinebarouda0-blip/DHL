<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL Tracking System</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  min-height:100vh;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:2px solid #ffcc00;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#ffcc00;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

/* RESULT CARD */
.card{
  margin-top:20px;
  border:2px solid #ffcc00;
  border-radius:10px;
  overflow:hidden;
  text-align:left;
}

/* HEADER */
.header{
  background:#ffcc00;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

/* TRACK */
.track{
  position:relative;
  height:12px;
  background:#ddd;
  border-radius:20px;
  margin:20px 0;
}

.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00c853,#00e676);
}

.truck{
  position:absolute;
  top:-30px;
  left:0%;
  font-size:24px;
  transform:translateX(-50%) scaleX(-1);
}

.status{
  font-weight:bold;
  margin-top:10px;
}

.days{
  font-weight:bold;
}

/* ADMIN */
.admin-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#ffcc00;
  border:none;
}

.admin{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.admin-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}
</style>
</head>

<body>

<div class="container">

<h2>📦 DHL Tracking System</h2>

<input id="code" placeholder="Enter Tracking Code">
<button onclick="search()">SEARCH</button>

<div id="result"></div>

</div>

<!-- ADMIN -->
<button class="admin-btn" onclick="openAdmin()">DHL</button>

<div class="admin" id="admin">
<div class="admin-box">

<h3>Admin Panel</h3>

<input id="fullname" placeholder="Name">
<input id="address" placeholder="Address">
<input id="gmail" placeholder="Email">
<input id="phone" placeholder="Phone">

<button onclick="addShipment()">SAVE SHIPMENT</button>

</div>
</div>

<script>

let shipments = JSON.parse(localStorage.getItem("shipments")) || [];

let clicks = 0;
let locked = false;

/* ADMIN */
function openAdmin(){

  if(locked) return;

  clicks++;
  if(clicks < 10) return;

  clicks = 0;
  locked = true;

  setTimeout(()=> locked = false, 3000);

  let pass = prompt("Password:");

  if(pass === "200911"){
    document.getElementById("admin").style.display = "flex";
  }else{
    alert("Wrong password");
  }
}

/* ➕ CREATE SHIPMENT */
function addShipment(){

  let code = "JD" + Math.floor(100000000000000000 + Math.random()*900000000000000000);

  let s = {
    code: code,
    fullname: fullname.value || "Unknown",
    address: address.value || "Unknown",
    gmail: gmail.value || "Unknown",
    phone: phone.value || "Unknown",
    createdAt: Date.now()
  };

  shipments.push(s);
  localStorage.setItem("shipments", JSON.stringify(shipments));

  document.getElementById("code").value = code;

  alert("Created: " + code);
}

/* 🔍 SEARCH */
function search(){

  let code = document.getElementById("code").value.trim();

  let s = shipments.find(x => x.code === code);

  if(!s){
    result.innerHTML = "❌ Not Found";
    return;
  }

  show(s);
}

/* 📦 DHL STYLE RECIVUTA */
function show(s){

  result.innerHTML = `
  <div class="card">

    <div class="header">DHL EXPRESS</div>

    <div style="padding:15px;">

      <h3 style="color:#cc0000;">📄 RECIVUTA</h3>

      <p><b>📦 Tracking:</b> ${s.code}</p>

      <div class="track">
        <div class="progress" id="bar"></div>
        <div class="truck" id="truck">🚚</div>
      </div>

      <div class="days" id="daysText"></div>

      <p><b>Name:</b> ${s.fullname}</p>
      <p><b>Address:</b> ${s.address}</p>
      <p><b>Email:</b> ${s.gmail}</p>
      <p><b>Phone:</b> ${s.phone}</p>

      <div class="status" id="status"></div>

    </div>

  </div>
  `;

  moveTruck(s.createdAt);
}

/* 🚚 MOVE SYSTEM (DAY 5 FREEZE) */
function moveTruck(start){

  const truck = document.getElementById("truck");
  const bar = document.getElementById("bar");
  const daysText = document.getElementById("daysText");
  const status = document.getElementById("status");

  let frozen = false;

  function update(){

    let hours = (Date.now() - start) / 3600000;

    let day = Math.floor(hours / 24);
    if(day > 6) day = 6;

    daysText.innerHTML = "📅 Day: " + day + " / 6";

    let progress = (day / 6) * 100;

    // ⛔ DAY 5 STOP
    if(day === 5){

      if(!frozen){
        frozen = true;
        status.innerHTML = "⚠️ Il tuo ordine è stato sospeso";
      }

      truck.style.left = progress + "%";
      bar.style.width = progress + "%";

      return;
    }

    // 🏁 DAY 6
    if(day >= 6){

      truck.style.left = "100%";
      bar.style.width = "100%";

      status.innerHTML = "✅ Consegnato in Italia 🇮🇹";

      return;
    }

    // 🚚 NORMAL MOVE
    truck.style.left = progress + "%";
    bar.style.width = progress + "%";

    requestAnimationFrame(update);
  }

  update();
}

</script>

</body>
</html>
