<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracking System</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#ffcc00,#ffffff);
  min-height:100vh;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:2px solid #ffcc00;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#ffcc00;
  border:none;
  font-weight:bold;
  cursor:pointer;
  border-radius:8px;
}

#result{
  margin-top:20px;
  text-align:left;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* TRACK */
.track{
  position:relative;
  height:12px;
  background:#ddd;
  border-radius:20px;
  margin:30px 0;
  overflow:visible;
}

.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00c853,#00e676);
  border-radius:20px;
}

/* 🚚 */
.truck{
  position:absolute;
  top:-35px;
  left:0%;
  font-size:26px;
  transform:translateX(-50%) scaleX(-1);
}

/* ADMIN */
.admin-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#ffcc00;
  border:none;
  cursor:pointer;
}

.admin{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.admin-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}
</style>
</head>

<body>

<div class="container">

<h2>📦 Tracking System</h2>

<input id="code" placeholder="Enter Tracking Code">
<button onclick="search()">SEARCH</button>

<div id="result"></div>

</div>

<!-- ADMIN -->
<button class="admin-btn" onclick="openAdmin()">DHL</button>

<div class="admin" id="admin">
<div class="admin-box">

<h3>Admin Panel</h3>

<input id="fullname" placeholder="Name">
<input id="address" placeholder="Address">
<input id="gmail" placeholder="Email">
<input id="phone" placeholder="Phone">

<button onclick="addShipment()">SAVE SHIPMENT</button>

</div>
</div>

<script>

/* STORAGE */
let shipments = JSON.parse(localStorage.getItem("shipments")) || [];

/* ADMIN SECURITY */
let clicks = 0;
let locked = false;

function openAdmin(){

  if(locked) return;

  clicks++;
  if(clicks < 10) return;

  clicks = 0;
  locked = true;

  setTimeout(()=> locked = false, 3000);

  let pass = prompt("Password:");

  if(pass === "200911"){
    document.getElementById("admin").style.display = "flex";
  }else{
    alert("Wrong password");
  }
}

/* ➕ CREATE SHIPMENT */
function addShipment(){

  let code = "JD" + Math.floor(100000000000000000 + Math.random()*900000000000000000);

  let s = {
    code: code,
    fullname: fullname.value || "Unknown",
    address: address.value || "Unknown",
    gmail: gmail.value || "Unknown",
    phone: phone.value || "Unknown",
    createdAt: Date.now()
  };

  shipments.push(s);
  localStorage.setItem("shipments", JSON.stringify(shipments));

  document.getElementById("code").value = code;

  alert("Created: " + code);
}

/* 🔍 SEARCH */
function search(){

  let code = document.getElementById("code").value.trim();

  let s = shipments.find(x => x.code === code);

  if(!s){
    result.innerHTML = "❌ Not Found";
    return;
  }

  show(s);
}

/* 📄 SHOW */
function show(s){

  result.innerHTML = `
  <div class="card">

    <h3>RECIVUTA</h3>

    <p><b>Tracking:</b> ${s.code}</p>

    <div class="track">
      <div class="progress" id="bar"></div>
      <div class="truck" id="truck">🚚</div>
    </div>

    <p><b>Name:</b> ${s.fullname}</p>
    <p><b>Address:</b> ${s.address}</p>
    <p><b>Email:</b> ${s.gmail}</p>
    <p><b>Phone:</b> ${s.phone}</p>

  </div>
  `;

  setTimeout(()=>moveTruck(s.createdAt),100);
}

/* 🚚 MOVE + STOP DAY 5 + FINAL DAY 6 */
function moveTruck(start){

  const truck = document.getElementById("truck");
  const bar = document.getElementById("bar");

  let stopped = false;

  function update(){

    let hours = (Date.now() - start) / 3600000;

    let progress = Math.min((hours / 144) * 100, 100);

    // ⛔ STOP DAY 5 (120h) PERMANENT
    if(hours >= 120 && hours < 144){

      if(!stopped){
        stopped = true;

        result.innerHTML = `
          <div class="card">
            <h2 style="color:red;">⚠️ تم تعليق طلبك</h2>
          </div>
        `;
      }

      truck.style.left = progress + "%";
      bar.style.width = progress + "%";

      return; // ❌ STOP COMPLETELY
    }

    // 🏁 DAY 6 DELIVERY
    if(hours >= 144){

      truck.style.left = "100%";
      bar.style.width = "100%";

      result.innerHTML = `
        <div class="card">
          <h2 style="color:red;">⚠️ Delivered</h2>
          <p>Arrived in Italy 🇮🇹</p>
        </div>
      `;

      return;
    }

    // 🚚 NORMAL MOVE
    truck.style.left = progress + "%";
    bar.style.width = progress + "%";

    requestAnimationFrame(update);
  }

  update();
}

</script>

</body>
</html>
