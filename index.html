<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL Tracking System - Professional</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Cairo', sans-serif;
  background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height:100vh;
  padding:20px;
  overflow-x:hidden;
}

.container{
  max-width:500px;
  margin:auto;
  background:linear-gradient(145deg, #ffffff, #f0f0f0);
  border-radius:25px;
  box-shadow:0 25px 50px rgba(0,0,0,0.15);
  padding:30px;
  text-align:center;
  position:relative;
  overflow:hidden;
}

.container::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:5px;
  background:linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4);
}

.logo{
  font-size:2.5em;
  background:linear-gradient(45deg, #ff6b6b, #ffd93d);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:10px;
  font-weight:700;
}

.title{
  color:#333;
  margin-bottom:30px;
  font-size:1.3em;
  font-weight:600;
}

.input-group{
  position:relative;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:18px 20px 18px 60px;
  border:3px solid #e0e0e0;
  border-radius:15px;
  font-size:16px;
  font-family:'Cairo', sans-serif;
  background:#fff;
  transition:all 0.3s ease;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

input:focus{
  outline:none;
  border-color:#ffd93d;
  box-shadow:0 10px 25px rgba(255,217,61,0.3);
  transform:translateY(-2px);
}

.search-btn{
  width:100%;
  padding:18px;
  margin-top:15px;
  background:linear-gradient(45deg, #ff6b6b, #ff8e8e);
  border:none;
  border-radius:15px;
  font-size:18px;
  font-weight:600;
  color:white;
  cursor:pointer;
  transition:all 0.3s ease;
  box-shadow:0 10px 25px rgba(255,107,107,0.4);
  font-family:'Cairo', sans-serif;
}

.search-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 15px 35px rgba(255,107,107,0.5);
}

/* RESULT CARD */
.card{
  margin-top:25px;
  border:3px solid transparent;
  border-radius:20px;
  overflow:hidden;
  background:linear-gradient(145deg, #ffffff, #f8f9fa);
  box-shadow:0 20px 40px rgba(0,0,0,0.1);
  animation:slideUp 0.5s ease;
}

@keyframes slideUp{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

.header{
  background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  padding:20px;
  color:white;
  font-weight:700;
  font-size:1.1em;
}

.info-grid{
  padding:25px;
  display:grid;
  gap:15px;
}

.info-item{
  display:flex;
  align-items:center;
  padding:12px;
  background:linear-gradient(135deg, #f8f9fa, #e9ecef);
  border-radius:12px;
  border-left:5px solid #ffd93d;
}

.icon{
  font-size:1.4em;
  margin-left:12px;
  background:linear-gradient(45deg, #ff6b6b, #ffd93d);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.track-container{
  margin:25px 0;
  position:relative;
}

.track{
  height:15px;
  background:linear-gradient(90deg, #e0e0e0, #f0f0f0);
  border-radius:10px;
  overflow:hidden;
}

.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg, #4ecdc4, #44a08d);
  border-radius:10px;
  transition:all 0.5s ease;
}

.truck{
  position:absolute;
  top:-35px;
  font-size:28px;
  transition:all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3));
}

.status{
  font-weight:700;
  font-size:1.1em;
  margin-top:15px;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

.status.delivered{
  background:linear-gradient(135deg, #6bcf7f, #4ecdc4);
  color:white;
}

.status.frozen{
  background:linear-gradient(135deg, #ff6b6b, #ff8e8e);
  color:white;
}

/* 🎫 RECIVUTA BUTTON */
.print-btn{
  width:100%;
  padding:15px;
  margin-top:20px;
  background:linear-gradient(45deg, #ffd93d, #ffed4e);
  border:none;
  border-radius:15px;
  font-size:18px;
  font-weight:700;
  color:#333;
  cursor:pointer;
  transition:all 0.3s ease;
  box-shadow:0 10px 25px rgba(255,217,61,0.4);
  font-family:'Cairo', sans-serif;
}

.print-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 15px 35px rgba(255,217,61,0.5);
}

/* 🖨️ RECIVUTA PRINT */
.recivuta{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  backdrop-filter:blur(15px);
  justify-content:center;
  align-items:center;
  z-index:3000;
  padding:20px;
}

.recivuta-content{
  background:white;
  width:100%;
  max-width:800px;
  max-height:90vh;
  overflow-y:auto;
  border-radius:15px;
  box-shadow:0 30px 80px rgba(0,0,0,0.5);
  animation:printModal 0.4s ease;
}

@keyframes printModal{
  from{opacity:0; transform:scale(0.8) rotate(-5deg);}
  to{opacity:1; transform:scale(1) rotate(0);}
}

.recivuta-header{
  background:linear-gradient(135deg, #ff6b6b, #ff8e8e);
  color:white;
  padding:25px;
  text-align:center;
  position:relative;
}

.recivuta-header h1{
  font-size:2.2em;
  font-weight:700;
  margin-bottom:5px;
}

.dhl-logo{
  font-size:4em;
  margin-bottom:10px;
}

.recivuta-body{
  padding:35px;
}

.invoice-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
  margin-bottom:30px;
}

.invoice-section{
  background:#f8f9fa;
  padding:25px;
  border-radius:15px;
  border:2px solid #e9ecef;
}

.section-title{
  color:#ff6b6b;
  font-size:1.3em;
  font-weight:700;
  margin-bottom:20px;
  padding-bottom:10px;
  border-bottom:3px solid #ffd93d;
}

.detail-row{
  display:flex;
  justify-content:space-between;
  margin-bottom:12px;
  padding:8px 0;
  border-bottom:1px solid #dee2e6;
}

.detail-row:last-child{
  border-bottom:none;
  font-weight:700;
  color:#ff6b6b;
  font-size:1.1em;
}

.barcode{
  text-align:center;
  margin:30px 0;
}

.barcode-code{
  font-family:'Courier New', monospace;
  font-size:1.5em;
  font-weight:700;
  letter-spacing:3px;
  background:linear-gradient(90deg, #333, #666);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

.footer-note{
  background:linear-gradient(135deg, #667eea, #764ba2);
  color:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
  margin-top:30px;
  font-size:0.95em;
}

.print-actions{
  padding:25px;
  text-align:center;
  border-top:3px solid #ffd93d;
  background:#f8f9fa;
}

.close-print{
  background:linear-gradient(45deg, #ff6b6b, #ff8e8e);
  color:white;
  border:none;
  padding:15px 30px;
  border-radius:10px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  margin-left:15px;
}

.print-btn-final{
  background:linear-gradient(45deg, #28a745, #20c997);
  color:white;
  border:none;
  padding:15px 30px;
  border-radius:10px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
}

/* ADMIN */
.admin-btn{
  position:fixed;
  bottom:25px;
  right:25px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:linear-gradient(135deg, #667eea, #764ba2);
  border:4px solid white;
  box-shadow:0 15px 30px rgba(102,126,234,0.4);
  font-size:1.5em;
  cursor:pointer;
  transition:all 0.3s ease;
  z-index:1000;
}

.admin{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  backdrop-filter:blur(10px);
  justify-content:center;
  align-items:center;
  z-index:2000;
}

.admin-box{
  background:linear-gradient(145deg, #ffffff, #f0f0f0);
  padding:30px;
  border-radius:25px;
  width:90%;
  max-width:450px;
  box-shadow:0 30px 60px rgba(0,0,0,0.3);
}

@media (max-width:768px){
  .invoice-grid{grid-template-columns:1fr;}
  .recivuta-body{padding:20px;}
}
</style>
</head>

  recivuta.style.display = "flex";
