<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL Tracking System</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:linear-gradient(135deg,#ff6b6b,#feca57,#ff9ff3);
  min-height:100vh;
  padding:20px;
}

.container{
  max-width:650px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:15px;
  text-align:center;
}

/* SEARCH */
.search-box{
  position:relative;
  margin-top:20px;
}

#searchInput{
  width:100%;
  padding:15px 50px 15px 15px;
  font-size:16px;
  border:2px solid #ffcc00;
  border-radius:10px;
  outline:none;
}

.search-btn{
  position:absolute;
  right:5px;
  top:5px;
  height:85%;
  width:45px;
  border:none;
  background:#ffcc00;
  border-radius:8px;
  cursor:pointer;
}

/* RESULT */
.result{
  display:none;
  margin-top:20px;
  text-align:left;
}

/* DHL CARD */
.dhl-card{
  max-width:500px;
  margin:auto;
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* HEADER */
.dhl-header{
  background:#ffcc00;
  padding:18px;
  text-align:center;
}

/* TRACK BAR */
.track-line{
  height:10px;
  background:#eee;
  border-radius:20px;
  overflow:hidden;
  margin:10px 0;
}

.progress{
  height:100%;
  background:#28a745;
}

/* ADMIN BUTTON */
.dhl-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#ffcc00;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

/* ADMIN PANEL */
.admin{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.admin-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
}
</style>
</head>

<body>

<div class="container">

<h2>DHL Tracking System</h2>

<div class="search-box">
<input id="searchInput" placeholder="DHL-XXXXXX">
<button class="search-btn" onclick="searchTracking()">Search</button>
</div>

<div id="result" class="result"></div>

</div>

<!-- ADMIN BUTTON (10 clicks) -->
<button class="dhl-btn" onclick="adminClick()">ADMIN</button>

<!-- ADMIN PANEL -->
<div class="admin" id="admin">
<div class="admin-box">

<h3>Admin Panel</h3>

<input id="fullname" placeholder="Nome e Cognome">
<input id="address" placeholder="Indirizzo">
<input id="gmail" placeholder="Gmail">
<input id="phone" placeholder="Numero telefono">

<button onclick="addShipment()">Add Shipment</button>

</div>
</div>

<script>

let shipments = JSON.parse(localStorage.getItem("dhlShipments")) || [];

let adminClicks = 0;
const PASSWORD = "200911";

/* ADMIN CLICK 10 TIMES */
function adminClick(){

  adminClicks++;

  if(adminClicks < 10) return;

  adminClicks = 0;

  const pass = prompt("Enter Admin Password:");

  if((pass || "").trim() === PASSWORD){
    document.getElementById("admin").style.display = "flex";
  }else{
    alert("Wrong password");
  }
}

/* ADD SHIPMENT */
function addShipment(){

  const code = "DHL-" + Math.floor(Math.random()*900000+100000);

  const s = {
    code,
    fullname: document.getElementById("fullname").value,
    address: document.getElementById("address").value,
    gmail: document.getElementById("gmail").value,
    phone: document.getElementById("phone").value,
    createdAt: Date.now()
  };

  shipments.unshift(s);
  localStorage.setItem("dhlShipments", JSON.stringify(shipments));

  alert("Added: " + code);

  showTrackingAndReceipt(s);
}

/* SEARCH */
function searchTracking(){

  const code = document.getElementById("searchInput").value.toUpperCase();
  const s = shipments.find(x => x.code === code);

  if(!s){
    document.getElementById("result").style.display="block";
    document.getElementById("result").innerHTML="Not Found";
    return;
  }

  showTrackingAndReceipt(s);
}

/* TRACKING + RECEIPT */
function showTrackingAndReceipt(s){

  let passedDays = Math.floor((Date.now() - s.createdAt)/86400000);
  if(passedDays > 6) passedDays = 6;

  let progress = (passedDays/6)*100;

  document.getElementById("result").style.display = "block";

  document.getElementById("result").innerHTML = `

  <div class="dhl-card">

    <!-- HEADER -->
    <div class="dhl-header">
      <h2 style="margin:0;">DHL EXPRESS</h2>
      <small>Tracking & Receipt System</small>
    </div>

    <div style="padding:20px;">

      <p><b>Tracking Code:</b> ${s.code}</p>
      <p><b>Status:</b> <span style="color:green;">In Transit</span></p>
      <p><b>Day:</b> ${passedDays}/6</p>

      <div class="track-line">
        <div class="progress" style="width:${progress}%"></div>
      </div>

      <hr>

      <h3 style="color:#d40511;">Receiver Details</h3>

      <p><b>Nome e Cognome:</b> ${s.fullname}</p>

      <p>
        <b>Indirizzo:</b><br>
        <span style="display:block;padding:8px;background:#f5f5f5;border-left:4px solid #ffcc00;border-radius:5px;">
          ${s.address}
        </span>
      </p>

      <p><b>Email:</b> ${s.gmail}</p>
      <p><b>Numero telefono:</b> ${s.phone}</p>

      <hr>

      <p style="text-align:center;color:#d40511;font-weight:bold;">
        DHL Global Logistics
      </p>

    </div>
  </div>

  `;
}

</script>

</body>
</html>
