<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL Tracking System</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:linear-gradient(135deg,#ff6b6b,#feca57,#ff9ff3);
  min-height:100vh;
  padding:20px;
}

.container{
  max-width:650px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:15px;
  text-align:center;
}

/* SEARCH */
.search-box{
  position:relative;
  margin-top:20px;
}

#searchInput{
  width:100%;
  padding:15px;
  font-size:16px;
  border:2px solid #ffcc00;
  border-radius:10px;
  outline:none;
}

.search-btn{
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  background:#ffcc00;
  font-weight:bold;
  cursor:pointer;
}

/* RESULT */
.result{
  display:none;
  margin-top:20px;
}

/* ADMIN BUTTON */
.dhl-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#ffcc00;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

/* ADMIN */
.admin{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

.admin-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
}

@keyframes shake{
  0%{transform:translateX(-50%) translateY(0px);}
  50%{transform:translateX(-50%) translateY(1px);}
  100%{transform:translateX(-50%) translateY(0px);}
}
</style>
</head>

<body>

<div class="container">

<h2>DHL Tracking System</h2>

<div class="search-box">
<input id="searchInput" placeholder="DHL-XXXXXX">
<button class="search-btn" onclick="searchTracking()">Search</button>
</div>

<div id="result" class="result"></div>

</div>

<!-- ADMIN -->
<button class="dhl-btn" onclick="adminClick()">ADMIN</button>

<div class="admin" id="admin">
<div class="admin-box">

<h3>Admin Panel</h3>

<input id="fullname" placeholder="Nome e Cognome">
<input id="address" placeholder="Indirizzo">
<input id="gmail" placeholder="Gmail">
<input id="phone" placeholder="Numero telefono">

<button onclick="addShipment()">Add Shipment</button>

</div>
</div>

<script>

let shipments = JSON.parse(localStorage.getItem("dhlShipments")) || [];

let clicks = 0;
const PASSWORD = "200911";

/* ADMIN 10 CLICKS */
function adminClick(){

  clicks++;
  if(clicks < 10) return;

  clicks = 0;

  const pass = prompt("Enter Password:");

  if((pass||"").trim() === PASSWORD){
    document.getElementById("admin").style.display="flex";
  }else{
    alert("Wrong password");
  }
}

/* ADD */
function addShipment(){

  const code = "DHL-" + Math.floor(Math.random()*900000+100000);

  const s = {
    code,
    fullname: document.getElementById("fullname").value,
    address: document.getElementById("address").value,
    gmail: document.getElementById("gmail").value,
    phone: document.getElementById("phone").value,
    createdAt: Date.now()
  };

  shipments.unshift(s);
  localStorage.setItem("dhlShipments", JSON.stringify(shipments));

  alert("Added: " + code);

  showTrackingAndReceipt(s);
}

/* SEARCH */
function searchTracking(){

  const code = document.getElementById("searchInput").value.toUpperCase();
  const s = shipments.find(x => x.code === code);

  if(!s){
    document.getElementById("result").style.display="block";
    document.getElementById("result").innerHTML="Not Found";
    return;
  }

  showTrackingAndReceipt(s);
}

/* RECEIPT + TRACKING */
function showTrackingAndReceipt(s){

  let hours = Math.floor((Date.now() - s.createdAt) / (1000*60*60));
  if(hours > 144) hours = 144;

  let progress = (hours / 144) * 100;

  document.getElementById("result").style.display="block";

  document.getElementById("result").innerHTML = `

  <div style="
    max-width:520px;
    margin:auto;
    background:#fff;
    border:1px solid #ddd;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:left;
  ">

    <!-- HEADER -->
    <div style="background:#ffcc00;padding:15px;text-align:center;">
      <h2 style="margin:0;">DHL EXPRESS</h2>
      <small>Official Shipping Document</small>
    </div>

    <div style="padding:20px;">

      <!-- TRACKING -->
      <div style="background:#f5f5f5;padding:10px;border-left:5px solid #ffcc00;margin-bottom:10px;">
        <b>Tracking Number:</b>
        <span style="color:#d40511;font-weight:bold;font-size:16px;">
          ${s.code}
        </span>
      </div>

      <p><b>Status:</b> In Transit</p>

      <!-- PROGRESS -->
      <div style="position:relative;height:14px;background:#eee;border-radius:20px;margin:15px 0;overflow:visible;">

        <div style="width:${progress}%;height:100%;background:#28a745;border-radius:20px;"></div>

        <div style="
          position:absolute;
          top:-28px;
          left:${progress}%;
          transform:translateX(-50%);
          font-size:24px;
          animation:shake 0.4s infinite;
        ">
          🚚<span style="font-size:10px;background:#ffcc00;padding:2px 4px;border-radius:3px;">DHL</span>
        </div>

      </div>

      <hr>

      <!-- INFO -->
      <p><b>Name:</b> ${s.fullname}</p>
      <p><b>Address:</b> ${s.address}</p>
      <p><b>Email:</b> ${s.gmail}</p>
      <p><b>Phone:</b> ${s.phone}</p>

      <hr>

      <p style="text-align:center;color:#d40511;font-weight:bold;">
        DHL Global Logistics
      </p>

    </div>
  </div>

  `;
}

</script>

</body>
</html>
